<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Othello</title>
<style>
  :root{
    --felt:#1f7a44; --felt-dark:#155e34; --felt-deep:#0d3d22;
    --line:#0c3a20; --panel:#102a1c; --panel-2:#16361f;
    --ink:#e8f3ea; --muted:#9fc4ac; --accent:#7dd3fc;
    --p1:#181a1c; --p1-edge:#3a3f44;        /* X = player 1 = dark disc */
    --p2:#f3f5f2; --p2-edge:#c7ccc5;        /* O = player 2 = light disc */
    --ring-p1:#22d3ee;  --ring-p2:#f59e0b;  /* last-move rings */
    --hint:#a78bfa;
    --danger:#f87171;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font:14px/1.45 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a8f53 0%, var(--felt) 38%, var(--felt-dark) 72%, var(--felt-deep) 100%);
    min-height:100%;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:22px 18px 40px;
    display:grid;grid-template-columns:minmax(300px,1fr) 320px;gap:24px;align-items:start}
  @media (max-width:860px){.wrap{grid-template-columns:1fr}}
  h1{font-size:20px;margin:0 0 2px;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  h1 .sz{font-size:12px;color:var(--muted);font-weight:500}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}

  /* ── Board ── */
  .boardwrap{display:flex;flex-direction:column;align-items:center}
  .board{
    --n:6;
    display:grid;gap:2px;background:var(--line);
    padding:10px;border-radius:10px;
    box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.04);
    grid-template-columns:18px repeat(var(--n),1fr);
    grid-template-rows:18px repeat(var(--n),1fr);
    width:min(72vw,520px);aspect-ratio:1;
    user-select:none;
  }
  .hdr{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px}
  .cell{
    position:relative;background:var(--felt);border-radius:5px;cursor:default;
    transition:background .12s;
  }
  .cell.legal{cursor:pointer}
  .cell.legal:hover{background:#268a4d}
  .disc{
    position:absolute;inset:11%;border-radius:50%;
    box-shadow:inset 0 -3px 6px rgba(0,0,0,.35), 0 3px 5px rgba(0,0,0,.35);
    transform:scale(0);transition:transform .16s ease;
  }
  .disc.show{transform:scale(1)}
  .disc.flip{animation:flip .32s ease}
  @keyframes flip{0%{transform:scale(1) rotateY(0)}50%{transform:scale(.55) rotateY(90deg)}100%{transform:scale(1) rotateY(0)}}
  .disc.p1{background:radial-gradient(circle at 38% 32%, #404449, var(--p1));border:1px solid var(--p1-edge)}
  .disc.p2{background:radial-gradient(circle at 38% 32%, #ffffff, var(--p2));border:1px solid var(--p2-edge)}
  .ring{position:absolute;inset:5%;border-radius:50%;pointer-events:none}
  .ring.r1{box-shadow:0 0 0 3px var(--ring-p1), 0 0 12px var(--ring-p1)}
  .ring.r2{box-shadow:0 0 0 3px var(--ring-p2), 0 0 12px var(--ring-p2)}
  .dot{position:absolute;inset:36%;border-radius:50%;opacity:.55;pointer-events:none}
  .dot.d1{background:#0b0c0d}
  .dot.d2{background:#eef0ec}
  .hintmark{
    position:absolute;inset:14%;border-radius:50%;pointer-events:none;
    border:2px dashed var(--hint);
    box-shadow:0 0 14px var(--hint);
    animation:pulse 1.1s ease-in-out infinite;
  }
  .hintmark::after{content:"";position:absolute;inset:18%;border-radius:50%;
    background:var(--hint);opacity:.28}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}

  /* ── Panel ── */
  .panel{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:12px;
    padding:14px;display:flex;flex-direction:column;gap:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .score{display:flex;gap:10px}
  .scard{flex:1;background:var(--panel-2);border-radius:10px;padding:10px 12px;position:relative;
    border:1px solid transparent}
  .scard.turn{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .scard .who{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .scard .num{font-size:26px;font-weight:700}
  .chip{width:14px;height:14px;border-radius:50%;display:inline-block;flex:none}
  .chip.c1{background:radial-gradient(circle at 38% 32%, #404449, var(--p1));border:1px solid var(--p1-edge)}
  .chip.c2{background:radial-gradient(circle at 38% 32%, #fff, var(--p2));border:1px solid var(--p2-edge)}

  .status{font-size:13px;min-height:20px}
  .status b{color:var(--accent)}
  .banner{background:#3a2a10;border:1px solid #7a5a1e;color:#ffd98a;padding:8px 10px;
    border-radius:8px;font-size:12px;display:none}
  .banner.show{display:block}
  .err{color:var(--danger);font-size:12px;min-height:0}

  .row{display:flex;gap:8px;flex-wrap:wrap}
  button{font:inherit;color:var(--ink);background:var(--panel-2);
    border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 11px;cursor:pointer;
    transition:background .12s,transform .05s}
  button:hover:not(:disabled){background:#1d4327}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:#1f6f3e;border-color:#2f9a58}
  button.primary:hover:not(:disabled){background:#26854a}
  button.wide{flex:1}
  .nav button{flex:1;font-variant-numeric:tabular-nums}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;color:var(--muted)}
  .toggle input{accent-color:var(--accent);width:16px;height:16px}

  .seg{display:flex;background:var(--panel-2);border-radius:8px;padding:2px;border:1px solid rgba(255,255,255,.07)}
  .seg button{flex:1;background:transparent;border:none;padding:6px 8px;border-radius:6px;color:var(--muted)}
  .seg button.on{background:#1f6f3e;color:var(--ink)}

  details{background:var(--panel-2);border-radius:10px;border:1px solid rgba(255,255,255,.07)}
  details>summary{cursor:pointer;padding:10px 12px;font-weight:600;list-style:none}
  details>summary::-webkit-details-marker{display:none}
  details .body{padding:0 12px 12px;display:flex;flex-direction:column;gap:10px}
  label.field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
  select,input[type=number]{font:inherit;color:var(--ink);background:#0e2417;
    border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:7px 8px}

  .log{background:var(--panel-2);border-radius:10px;max-height:230px;overflow:auto;
    border:1px solid rgba(255,255,255,.07)}
  .log table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
  .log td{padding:4px 8px}
  .log tr{cursor:pointer}
  .log tr:hover{background:#1a3a24}
  .log tr.cur{background:#234a30}
  .log .mv{color:var(--muted)}
  .kbd{font-size:11px;color:var(--muted);line-height:1.7}
  .kbd code{background:#0e2417;border:1px solid rgba(255,255,255,.12);border-radius:4px;
    padding:1px 5px;font-size:11px}
</style>

<div class="wrap">
  <div class="boardwrap">
    <h1>Othello <span class="sz" id="szlabel"></span></h1>
    <div class="sub">Dark = X (player 1, starts) · Light = O (player 2)</div>
    <div class="board" id="board"></div>
    <div style="height:14px"></div>
    <div class="kbd">
      <code>←</code>/<code>→</code> step · <code>Home</code>/<code>End</code> jump ·
      <code>Space</code> agent move/pass · <code>h</code> hint · <code>l</code> legal · <code>n</code> new game
    </div>
  </div>

  <div class="panel">
    <div class="score">
      <div class="scard" id="card1">
        <div class="who"><span class="chip c1"></span><span id="who1">Player 1</span></div>
        <div class="num" id="num1">2</div>
      </div>
      <div class="scard" id="card2">
        <div class="who"><span class="chip c2"></span><span id="who2">Player 2</span></div>
        <div class="num" id="num2">2</div>
      </div>
    </div>

    <div class="status" id="status">Loading…</div>
    <div class="banner" id="banner"></div>
    <div class="err" id="err"></div>

    <div class="row nav">
      <button id="b-start" title="Start (Home)">⏮</button>
      <button id="b-back"  title="Back (←)">◀ Back</button>
      <button id="b-fwd"   title="Forward (→)">Fwd ▶</button>
      <button id="b-latest"title="Latest (End)">⏭</button>
    </div>

    <div class="row">
      <button id="b-hint" class="wide" title="Show model's move (h)">💡 Show model move</button>
      <button id="b-step" class="wide primary" title="Play agent move (Space)">▶ Play agent move</button>
    </div>

    <div class="row">
      <button id="b-auto" class="wide">▶ Auto-play</button>
      <button id="b-pass">Pass</button>
      <button id="b-new" title="New game (n)">↺ New game</button>
    </div>

    <label class="toggle"><input type="checkbox" id="t-legal" checked> Show legal moves</label>
    <label class="toggle"><input type="checkbox" id="t-respond" checked> Agent replies automatically (vs human)</label>

    <details id="cfg">
      <summary>⚙ Match setup</summary>
      <div class="body">
        <label class="field">Player 1 — X (dark, starts)
          <select id="p1sel"></select></label>
        <label class="field">Player 2 — O (light)
          <select id="p2sel"></select></label>
        <div class="row">
          <label class="field" style="flex:1">Board size
            <input type="number" id="bsize" min="4" max="8" step="2" value="6"></label>
          <label class="field" style="flex:1">Agent ε (randomness)
            <input type="number" id="eps" min="0" max="1" step="0.05" value="0"></label>
        </div>
        <label class="field">Auto-play speed
          <select id="speed">
            <option value="700">Slow</option>
            <option value="350" selected>Normal</option>
            <option value="120">Fast</option>
            <option value="0">Instant</option>
          </select></label>
        <button id="b-apply" class="primary">Apply &amp; start new game</button>
      </div>
    </details>

    <div class="log" id="log"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let S = null;            // last server state
let prevBoard = null;    // for flip animation
let showLegal = true;
let autoRespond = true;
let autoPlay = false;
let preview = null;      // {row,col} or {pass:true}
let busy = false;
let options = {models:[], rules:[], board_size:6};
let autoTimer = null;

async function api(path, body){
  const opt = body===undefined ? {} :
    {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)};
  const r = await fetch(path, opt);
  return r.json();
}

function discIndex(v){ return v===1 ? 1 : (v===-1 ? 2 : 0); }

function buildBoard(n){
  const b = $("#board");
  b.style.setProperty("--n", n);
  b.innerHTML = "";
  b.appendChild(corner());
  for(let c=0;c<n;c++) b.appendChild(hdr(c));
  for(let r=0;r<n;r++){
    b.appendChild(hdr(r));
    for(let c=0;c<n;c++){
      const cell = document.createElement("div");
      cell.className="cell"; cell.dataset.r=r; cell.dataset.c=c;
      cell.addEventListener("click", ()=>onCellClick(r,c));
      b.appendChild(cell);
    }
  }
  $("#szlabel").textContent = `${n}×${n}`;
}
function hdr(t){const d=document.createElement("div");d.className="hdr";d.textContent=t;return d;}
function corner(){const d=document.createElement("div");d.className="hdr";return d;}

function render(){
  if(!S) return;
  const n = S.board_size;
  const cells = $("#board").querySelectorAll(".cell");
  const legalSet = new Set(S.legal_moves.map(m=>m.row*n+m.col));
  const lm1 = S.last_move.p1, lm2 = S.last_move.p2;
  const humanTurn = !S.is_agent_turn && !S.done;

  cells.forEach(cell=>{
    const r=+cell.dataset.r, c=+cell.dataset.c, idx=r*n+c;
    const v = S.board[r][c];
    cell.innerHTML="";
    cell.classList.toggle("legal", showLegal && humanTurn && legalSet.has(idx) && S.at_latest);

    if(v!==0){
      const disc=document.createElement("div");
      disc.className="disc show "+(v===1?"p1":"p2");
      // flip animation for discs that changed owner
      if(prevBoard && prevBoard[r] && prevBoard[r][c]!==undefined && prevBoard[r][c]!==v && prevBoard[r][c]!==0)
        disc.classList.add("flip");
      cell.appendChild(disc);
      if(lm1 && lm1.row===r && lm1.col===c){const g=document.createElement("div");g.className="ring r1";cell.appendChild(g);}
      if(lm2 && lm2.row===r && lm2.col===c){const g=document.createElement("div");g.className="ring r2";cell.appendChild(g);}
    } else {
      if(showLegal && humanTurn && legalSet.has(idx) && S.at_latest){
        const d=document.createElement("div");
        d.className="dot "+(S.current_player===1?"d1":"d2");
        cell.appendChild(d);
      }
    }
    if(preview && preview.row===r && preview.col===c){
      const h=document.createElement("div");h.className="hintmark";cell.appendChild(h);
    }
  });

  // scores + turn
  $("#num1").textContent=S.scores.p1; $("#num2").textContent=S.scores.p2;
  $("#who1").textContent=label(1); $("#who2").textContent=label(-1);
  $("#card1").classList.toggle("turn", S.current_player===1 && !S.done);
  $("#card2").classList.toggle("turn", S.current_player===-1 && !S.done);

  // status
  const st=$("#status");
  if(S.done){
    let msg;
    if(S.winner===0) msg="Draw.";
    else { const w=S.winner; msg=`<b>${label(w)} wins</b> ${S.scores.p1}–${S.scores.p2}.`; }
    st.innerHTML = "Game over — "+msg;
  } else {
    const side = S.current_player===1?"X":"O";
    const role = S.is_agent_turn? "agent" : "human";
    st.innerHTML = `Move ${S.history_len+ (S.at_latest?0:0)} · <b>${label(S.current_player)}</b> to play (${side}, ${role})`
      + (S.must_pass? " — must pass" : "");
  }

  // review banner
  const bn=$("#banner");
  if(!S.at_latest){
    bn.classList.add("show");
    bn.innerHTML=`Reviewing move ${S.view_cursor}/${S.history_len}. New move here branches the game. `
      +`<a href="#" id="tolatest" style="color:#ffd98a">Jump to latest →</a>`;
    const a=$("#tolatest"); if(a) a.onclick=(e)=>{e.preventDefault();nav("latest");};
  } else bn.classList.remove("show");

  // button enable/disable
  $("#b-start").disabled = S.view_cursor===0;
  $("#b-back").disabled  = S.view_cursor===0;
  $("#b-fwd").disabled   = S.at_latest;
  $("#b-latest").disabled= S.at_latest;
  $("#b-step").disabled  = !(S.is_agent_turn && S.at_latest && !S.done);
  $("#b-hint").disabled  = S.done;
  $("#b-pass").disabled  = !(S.can_pass && !S.is_agent_turn && S.at_latest && !S.done);
  $("#b-auto").classList.toggle("primary", autoPlay);
  $("#b-auto").textContent = autoPlay ? "⏸ Pause" : "▶ Auto-play";

  renderLog();
  prevBoard = S.board.map(row=>row.slice());
}

function label(side){
  const p = S.players[String(side)];
  return p ? p.label : (side===1?"Player 1":"Player 2");
}

function renderLog(){
  const log=$("#log");
  let rows = `<table><tbody>`;
  rows += `<tr class="${S.view_cursor===0?'cur':''}" data-k="0"><td class="mv">0</td><td>start</td></tr>`;
  S.history.forEach(h=>{
    const sym = h.player===1?"X":"O";
    const txt = h.pass ? "pass" : `(${h.row}, ${h.col})`;
    const k = h.index+1;
    rows += `<tr class="${S.view_cursor===k?'cur':''}" data-k="${k}"><td class="mv">${k}</td><td>${sym} ${txt}</td></tr>`;
  });
  rows += `</tbody></table>`;
  log.innerHTML=rows;
  log.querySelectorAll("tr").forEach(tr=>{
    tr.onclick=()=>nav("goto", +tr.dataset.k);
  });
  const cur=log.querySelector("tr.cur"); if(cur) cur.scrollIntoView({block:"nearest"});
}

function flash(msg){ const e=$("#err"); e.textContent=msg||""; if(msg) setTimeout(()=>{if(e.textContent===msg)e.textContent="";},2500); }

async function onCellClick(r,c){
  if(busy || !S || S.done || S.is_agent_turn) return;
  const n=S.board_size, idx=r*n+c;
  if(!S.legal_moves.some(m=>m.row===r&&m.col===c)) return;
  preview=null;
  await applyState(await api("/api/move",{action:idx}));
}

async function applyState(st){
  if(st.error) flash(st.error);
  if(st.errors && st.errors.length) flash(st.errors.join(" · "));
  if(!st.board) return;            // pure-error payload from preview etc.
  S=st; render(); scheduleAuto();
}

function scheduleAuto(){
  clearTimeout(autoTimer);
  if(busy || !S || S.done || !S.is_agent_turn || !S.at_latest) return;
  const humanInGame = S.players["1"].type==="human" || S.players["-1"].type==="human";
  const go = humanInGame ? autoRespond : autoPlay;
  if(!go) return;
  const delay = humanInGame ? 280 : (+$("#speed").value || 0);
  autoTimer = setTimeout(agentStep, delay);
}

async function agentStep(){
  if(busy || !S || S.done || !S.is_agent_turn || !S.at_latest) return;
  busy=true; preview=null;
  $("#status").innerHTML = `<b>${label(S.current_player)}</b> is thinking…`;
  try{ await applyState(await api("/api/agent_step",{})); }
  finally{ busy=false; }
}

async function nav(to, cursor){
  preview=null;
  await applyState(await api("/api/nav",{to, cursor}));
}

async function showHint(){
  if(busy || !S || S.done) return;
  const h = await api("/api/preview",{});
  if(h.error){ flash(h.error); return; }
  if(h.pass){ flash("Model would pass."); preview=null; render(); return; }
  preview={row:h.row, col:h.col}; render();
}

async function doPass(){
  if(!S || !S.can_pass) return;
  // pass action == n*n
  await applyState(await api("/api/move",{action:S.board_size*S.board_size}));
}

function toggleAuto(){
  autoPlay=!autoPlay; render();
  if(autoPlay) scheduleAuto(); else clearTimeout(autoTimer);
}

// ── setup panel ──
function fillSelectors(){
  const mk = (sel, side)=>{
    sel.innerHTML="";
    const add=(val,txt)=>{const o=document.createElement("option");o.value=val;o.textContent=txt;sel.appendChild(o);};
    add("human","Human");
    options.models.forEach(m=>add("model:"+m, "Model · "+m));
    options.rules.forEach(r=>add("rule:"+r, "Rule · "+r));
  };
  mk($("#p1sel"),1); mk($("#p2sel"),-1);
  // reflect current config
  if(S){
    $("#p1sel").value = specToVal(S.players["1"]);
    $("#p2sel").value = specToVal(S.players["-1"]);
    $("#bsize").value = S.board_size;
    $("#eps").value = S.epsilon ?? 0;
  }
}
function specToVal(p){
  if(!p) return "human";
  if(p.type==="human") return "human";
  if(p.type==="model"){ const m=p.label.replace(/^Model:\s*/,""); 
    const full=options.models.find(x=>x.endsWith(m)); return "model:"+(full||m); }
  if(p.type==="rule") return "rule:"+p.label.replace(/^Rule:\s*/,"");
  return "human";
}
function valToSpec(v){
  if(v==="human") return {type:"human"};
  if(v.startsWith("model:")) return {type:"model", path:v.slice(6)};
  if(v.startsWith("rule:"))  return {type:"rule",  name:v.slice(5)};
  return {type:"human"};
}
async function applyConfig(){
  autoPlay=false;
  const cfg={
    board_size:+$("#bsize").value,
    epsilon:+$("#eps").value,
    players:{ "1":valToSpec($("#p1sel").value), "-1":valToSpec($("#p2sel").value) }
  };
  buildBoard(cfg.board_size);
  prevBoard=null; preview=null;
  await applyState(await api("/api/config", cfg));
  options = await api("/api/options"); // refresh in case
  $("#cfg").open=false;
}

async function newGame(){
  autoPlay=false; preview=null; prevBoard=null;
  await applyState(await api("/api/reset",{}));
}

// ── wiring ──
$("#b-start").onclick =()=>nav("start");
$("#b-back").onclick  =()=>nav("back");
$("#b-fwd").onclick   =()=>nav("forward");
$("#b-latest").onclick=()=>nav("latest");
$("#b-step").onclick  =agentStep;
$("#b-hint").onclick  =showHint;
$("#b-auto").onclick  =toggleAuto;
$("#b-pass").onclick  =doPass;
$("#b-new").onclick   =newGame;
$("#b-apply").onclick =applyConfig;
$("#t-legal").onchange  =e=>{showLegal=e.target.checked; render();};
$("#t-respond").onchange=e=>{autoRespond=e.target.checked; scheduleAuto();};

document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
  const k=e.key;
  if(k==="ArrowLeft"){nav("back");e.preventDefault();}
  else if(k==="ArrowRight"){nav("forward");e.preventDefault();}
  else if(k==="Home"){nav("start");}
  else if(k==="End"){nav("latest");}
  else if(k===" "){ if(S&&S.is_agent_turn&&S.at_latest) agentStep(); else if(S&&S.can_pass) doPass(); e.preventDefault();}
  else if(k==="h"){showHint();}
  else if(k==="l"){showLegal=!showLegal;$("#t-legal").checked=showLegal;render();}
  else if(k==="n"){newGame();}
});

(async function init(){
  options = await api("/api/options");
  S = await api("/api/state");
  buildBoard(S.board_size);
  fillSelectors();
  render();
  scheduleAuto();
})();
</script>
